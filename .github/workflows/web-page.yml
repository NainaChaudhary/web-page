name: Node.js CI 

on:
  push:
    branches: [main, workflow_dispatch]

     

jobs:
  build:
    runs-on: [self-hosted,test]
    strategy:
      matrix:
        node-version: [14,15,16,17,18]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version}}

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test
    - name: checking
      run: echo "hello"
