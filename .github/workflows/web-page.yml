name: Node.js CI/CD 

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, test]

    strategy:
      fail-fast: false
      matrix:
        node-version: [14, 16]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  deploy:
    runs-on: [self-hosted, test]
    needs: build
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install PM2
        run: npm install -g pm2

      - name: Install dependencies
        run: npm install

      - name: Start app with PM2
        run: |
          pm2 delete myapp || true
          pm2 start server.js --name myapp
          pm2 save
