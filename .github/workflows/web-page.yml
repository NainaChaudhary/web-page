name: Node.js CI 

on:
  push:
    branches:
     - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Set up Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '14'

    # 3. Install dependencies
    - name: Install dependencies
      run: npm install

    # 4. Run tests (optional)
    - name: Run tests
      run: npm test

    # 5. Build 
    - name: Build app
      run: npmm run build
