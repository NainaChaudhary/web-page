name: Node.js CI 

on:
  push:
    branches: [main, workflow_dispatch]
     

jobs:
  build:
    runs-on: [self-hosted,test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test
    - name: checking
      run: echo "hello"
