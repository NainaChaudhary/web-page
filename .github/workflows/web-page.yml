name: Node.js CI 

on:
  push:
    branches:
     - main

jobs:
  build:
    runs-on: [self-hosted,test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test
